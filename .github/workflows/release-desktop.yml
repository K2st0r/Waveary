name: Release Desktop Installer

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Release tag, for example v0.1.0"
        required: true
      release_name:
        description: "Release title shown on GitHub"
        required: false
      draft:
        description: "Create as draft release"
        required: false
        default: "false"

jobs:
  build-windows-installer:
    runs-on: windows-latest
    permissions:
      contents: write

    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag_name || github.ref_name }}
      RELEASE_NAME: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.release_name || format('Waveary {0}', github.ref_name) }}
      RELEASE_DRAFT: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.draft || 'false' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run desktop:dist

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: waveary-windows-installer
          path: |
            waveary-desktop/dist/Waveary-Setup-Windows-x64.exe
            waveary-desktop/dist/Waveary-Setup-Windows-x64.exe.blockmap
          if-no-files-found: error

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_NAME }}
          draft: ${{ env.RELEASE_DRAFT == 'true' }}
          generate_release_notes: true
          files: |
            waveary-desktop/dist/Waveary-Setup-Windows-x64.exe
            waveary-desktop/dist/Waveary-Setup-Windows-x64.exe.blockmap
